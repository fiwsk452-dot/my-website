<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Chat — Sign in</title>
    <style>
      body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;background:#f6f7fb;margin:0;display:flex;align-items:center;justify-content:center;height:100vh}
      .card{background:#fff;padding:28px;border-radius:10px;box-shadow:0 6px 24px rgba(20,30,60,0.08);width:360px;text-align:center}
      .brand{font-weight:700;margin-bottom:8px}
      .btn{display:inline-block;padding:10px 14px;border-radius:8px;background:#4285F4;color:#fff;text-decoration:none;font-weight:600}
      .note{margin-top:12px;color:#666;font-size:13px}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">AI Chat — เข้าสู่ระบบด้วย Google</div>
      <p>ลงชื่อเข้าใช้ด้วยบัญชี Google เพื่อเริ่มแชทกับ AI</p>
      <a class="btn" href="/auth/google">Sign in with Google</a>
      <div class="note">หลังจากลงชื่อเข้าใช้แล้วระบบจะพาไปยังหน้าแชท</div>
    </div>
  </body>
  </html>
