<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Chat</title>
    <style>
      body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;height:100vh;display:flex;flex-direction:column}
      header{background:#0b74de;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
      main{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px}
      .messages{flex:1;overflow:auto;padding:8px;border:1px solid #eee;border-radius:8px;background:#fafafa}
      .msg{margin:6px 0;padding:8px;border-radius:8px;max-width:75%}
      .msg.user{background:#dbeafe;margin-left:auto}
      .msg.ai{background:#f1f5f9}
      form{display:flex;gap:8px}
      input[type=text]{flex:1;padding:10px;border-radius:8px;border:1px solid #ddd}
      button{padding:10px 12px;border-radius:8px;border:none;background:#0b74de;color:#fff}
    </style>
  </head>
  <body>
    <header>
      <div>AI Chat</div>
      <div><a id="logout" href="#" style="color:#fff;text-decoration:underline">Logout</a></div>
    </header>
    <div id="dev-banner" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:9999">
      <div style="background:#fff;padding:18px 20px;border-radius:8px;max-width:520px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.25)">
        <h2 style="margin:0 0 8px">เว็บไซต์อยู่ในช่วงพัฒนา</h2>
        <p style="margin:0 0 12px;color:#444">ฟีเจอร์การแชทนี้เป็นเวอร์ชันทดสอบ การตอบเป็นแบบจำลองเท่านั้น</p>
        <div style="display:flex;gap:8px;justify-content:center;align-items:center">
          <button id="dev-ok" style="padding:8px 12px;border-radius:6px;border:none;background:#0b74de;color:#fff;cursor:pointer">ตกลง เข้าใช้งาน</button>
          <label style="color:#666;font-size:13px;display:flex;align-items:center;gap:6px"><input id="dev-hide" type="checkbox"> ไม่แสดงอีก</label>
        </div>
      </div>
    </div>
    <main>
      <div id="whoami">กำลังโหลดข้อมูลบัญชี...</div>
      <div class="messages" id="messages"></div>
      <form id="form">
        <input id="input" type="text" placeholder="พิมพ์คำถามของคุณ..." autocomplete="off">
        <button type="submit">ส่ง</button>
      </form>
    </main>
    <script>
      // client-only whoami (from localStorage)
      function whoami(){
        const u = JSON.parse(localStorage.getItem('ai_chat_user')||'null');
        document.getElementById('whoami').textContent = u ? `เข้าสู่ระบบ: ${u.displayName}` : 'ไม่ได้เข้าสู่ระบบ';
        if(!u) document.getElementById('whoami').style.color='#c00';
      }
      function addMessage(text,cls){const el=document.createElement('div');el.className='msg '+cls;el.textContent=text;document.getElementById('messages').appendChild(el);document.getElementById('messages').scrollTop=1e9}

      // simple simulated AI reply (no server)
      function simulateAiReply(userMessage){
        const replies = [
          'ขอโทษ ฉันกำลังคิดอยู่...',
          'นี่คือคำตอบแบบจำลอง: ',
          'ขอบคุณที่ถาม ฉันช่วยได้ดังนี้...' 
        ];
        const pick = replies[Math.floor(Math.random()*replies.length)];
        return `${pick} ${userMessage}`;
      }

      document.getElementById('form').addEventListener('submit', async e=>{
        e.preventDefault();
        const input=document.getElementById('input');
        const txt=input.value.trim();
        if(!txt) return;
        addMessage(txt,'user');
        input.value='';
        // show typing
        const typing = document.createElement('div');typing.className='msg ai';typing.textContent='กำลังพิมพ์...';document.getElementById('messages').appendChild(typing);document.getElementById('messages').scrollTop=1e9;
        // simulate delay
        setTimeout(()=>{
          typing.remove();
          const reply = simulateAiReply(txt);
          addMessage(reply,'ai');
        }, 800 + Math.random()*900);
      });

      document.getElementById('logout').addEventListener('click', e=>{
        e.preventDefault(); localStorage.removeItem('ai_chat_user'); location.href='index.html';
      });

      whoami();
      (function(){
        const seen = localStorage.getItem('dev_banner_seen');
        const banner = document.getElementById('dev-banner');
        if(seen==='true') { banner.style.display='none'; return; }
        document.getElementById('dev-ok').addEventListener('click', ()=>{
          if(document.getElementById('dev-hide').checked) localStorage.setItem('dev_banner_seen','true');
          banner.style.display='none';
        });
      })();
    </script>
  </body>
</html>
